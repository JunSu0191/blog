name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: blog
  APP_DIR: /home/ubuntu/app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build bootJar
        run: ./gradlew bootJar

      - name: Copy artifact and deploy script to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          source: "build/libs/*.jar,scripts/deploy/restart-app.sh"
          target: "${{ env.APP_DIR }}"
          overwrite: true

      - name: Restart service on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: PROD_ENV_FILE,APP_DIR,APP_NAME
          script: |
            set -euo pipefail
            mkdir -p "${APP_DIR}" "${APP_DIR}/logs"
            printf '%s' "${PROD_ENV_FILE}" > "${APP_DIR}/.env"
            chmod 600 "${APP_DIR}/.env"
            cp "${APP_DIR}/build/libs/"*.jar "${APP_DIR}/app.jar"
            chmod +x "${APP_DIR}/scripts/deploy/restart-app.sh"
            "${APP_DIR}/scripts/deploy/restart-app.sh" "${APP_DIR}" "${APP_NAME}"
