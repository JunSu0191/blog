spring:
  flyway:
    enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${APP_OAUTH2_GOOGLE_CLIENT_ID}
            client-secret: ${APP_OAUTH2_GOOGLE_CLIENT_SECRET}
            scope: profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          kakao:
            client-id: ${APP_OAUTH2_KAKAO_CLIENT_ID}
            client-secret: ${APP_OAUTH2_KAKAO_CLIENT_SECRET}
            provider: kakao
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Kakao
            scope: profile_nickname,account_email
          naver:
            client-id: ${APP_OAUTH2_NAVER_CLIENT_ID}
            client-secret: ${APP_OAUTH2_NAVER_CLIENT_SECRET}
            provider: naver
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Naver
            scope: name,email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

app:
  web-base-url: ${APP_WEB_BASE_URL}
  api-base-url: ${APP_API_BASE_URL}
  public-base-url: ${APP_PUBLIC_BASE_URL}
  upload:
    public-base-url: ${APP_UPLOAD_PUBLIC_BASE_URL}
  storage:
    type: ${APP_STORAGE_TYPE:s3}
    local-root: ${APP_STORAGE_LOCAL_ROOT:./upload}
    s3:
      bucket: ${APP_STORAGE_S3_BUCKET}
      region: ${APP_STORAGE_S3_REGION}
      key-prefix: ${APP_STORAGE_S3_KEY_PREFIX:}
      public-base-url: ${APP_STORAGE_S3_PUBLIC_BASE_URL}
  tus:
    storage-path: ${APP_TUS_STORAGE_PATH:./upload/tus}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  auth:
    allow-dev-fallback: false
    reset-token-expire-seconds: ${APP_AUTH_RESET_TOKEN_EXPIRE_SECONDS}
    reset-token-hash-secret: ${APP_AUTH_RESET_TOKEN_HASH_SECRET}
  admin:
    seed:
      enabled: ${APP_ADMIN_SEED_ENABLED:false}
      username: ${APP_ADMIN_USERNAME:}
      password: ${APP_ADMIN_PASSWORD:}
      name: ${APP_ADMIN_NAME:}
      disallowed-password: ${APP_ADMIN_SEED_DISALLOWED_PASSWORD:}
      must-change-password: ${APP_ADMIN_MUST_CHANGE_PASSWORD:true}
  category:
    seed:
      enabled: ${APP_CATEGORY_SEED_ENABLED:false}
      overwrite-existing: ${APP_CATEGORY_SEED_OVERWRITE_EXISTING:false}
  blog:
    seed:
      enabled: ${APP_BLOG_SEED_ENABLED:false}
      overwrite-existing: ${APP_BLOG_SEED_OVERWRITE_EXISTING:false}
      author-username: ${APP_BLOG_SEED_AUTHOR_USERNAME:sample_seed_author}
      author-password: ${APP_BLOG_SEED_AUTHOR_PASSWORD:}
  oauth2:
    success-redirect-uri: ${APP_OAUTH2_SUCCESS_REDIRECT_URI}
    failure-redirect-uri: ${APP_OAUTH2_FAILURE_REDIRECT_URI}
  verification:
    code-expire-seconds: ${APP_VERIFICATION_CODE_EXPIRE_SECONDS}
    max-attempts: ${APP_VERIFICATION_MAX_ATTEMPTS}
    resend-cooldown-seconds: ${APP_VERIFICATION_RESEND_COOLDOWN_SECONDS}
    ip-rate-limit-per-minute: ${APP_VERIFICATION_IP_RATE_LIMIT_PER_MINUTE}
    hash-secret: ${APP_VERIFICATION_HASH_SECRET}
    mock-expose-code: false
