spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: blog
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/blog?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: Initial schema
    locations: classpath:db/migration
  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 100
        one-indexed-parameters: false

server:
  forward-headers-strategy: framework

logging:
  level:
    org.flywaydb: DEBUG

jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-at-least-32-bytes}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  upload:
    public-base-url: ${APP_UPLOAD_PUBLIC_BASE_URL:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://192.168.*.*:5173,http://10.*.*.*:5173,http://172.*.*.*:5173}
  auth:
    allow-dev-fallback: ${APP_AUTH_ALLOW_DEV_FALLBACK:false}
    dev-user-id: ${APP_AUTH_DEV_USER_ID:1}
  admin:
    seed:
      enabled: ${APP_ADMIN_SEED_ENABLED:false}
      username: ${APP_ADMIN_USERNAME:}
      password: ${APP_ADMIN_PASSWORD:}
      name: ${APP_ADMIN_NAME:}
      disallowed-password: ${APP_ADMIN_SEED_DISALLOWED_PASSWORD:}
      must-change-password: ${APP_ADMIN_MUST_CHANGE_PASSWORD:true}
