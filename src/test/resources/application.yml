spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: blog
  datasource:
    url: ${TEST_DB_URL:jdbc:h2:mem:blog-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${TEST_DB_USERNAME:sa}
    password: ${TEST_DB_PASSWORD:}
    driver-class-name: ${TEST_DB_DRIVER_CLASS_NAME:org.h2.Driver}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: Initial schema
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile,email
            client-name: Google
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret
            provider: kakao
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Kakao
            scope: profile_nickname,account_email
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
            provider: naver
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Naver
            scope: name,email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  secret: test-secret-key-at-least-32-characters-000000
  expiration-ms: 3600000

app:
  web-base-url: http://localhost:5173
  api-base-url: http://localhost:8080
  upload:
    image-max-size-bytes: 5242880
  oauth2:
    success-redirect-uri: http://localhost:5173/auth/callback
    failure-redirect-uri: http://localhost:5173/auth/callback
  verification:
    code-expire-seconds: 300
    max-attempts: 5
    resend-cooldown-seconds: 60
    ip-rate-limit-per-minute: 100
    hash-secret: test-verification-secret
    mock-expose-code: true
  auth:
    reset-token-expire-seconds: 900
    reset-token-hash-secret: test-reset-token-secret
