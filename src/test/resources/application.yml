spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: blog
  datasource:
    url: ${TEST_DB_URL:jdbc:h2:mem:blog-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${TEST_DB_USERNAME:sa}
    password: ${TEST_DB_PASSWORD:}
    driver-class-name: ${TEST_DB_DRIVER_CLASS_NAME:org.h2.Driver}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: Initial schema
    locations: classpath:db/migration

jwt:
  secret: test-secret-key-at-least-32-characters-000000
  expiration-ms: 3600000
